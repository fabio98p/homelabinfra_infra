---
- name: Imposta vm.max_map_count (requisito OpenSearch)
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-opensearch.conf
    content: "vm.max_map_count = 262144\n"
    owner: root
    group: root
    mode: "0644"

- name: Applica le impostazioni sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Installa Podman e podman-compose
  ansible.builtin.apt:
    name:
      - podman
      - podman-compose
    state: present

- name: Crea la directory di lavoro per i servizi platform
  ansible.builtin.file:
    path: "{{ compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Crea la directory di configurazione di Vault
  ansible.builtin.file:
    path: "{{ compose_dir }}/vault/config"
    state: directory
    owner: root
    group: root
    mode: "0750"

# Il processo vault nel container gira come uid 100 (utente 'vault' nell'immagine
# HashiCorp ufficiale). La directory dati deve essere di sua proprietà.
- name: Crea la directory dati di Vault con i permessi corretti
  ansible.builtin.file:
    path: "{{ compose_dir }}/vault/data"
    state: directory
    owner: "100"
    group: "1000"
    mode: "0750"

- name: Copia il file docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: "{{ compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"

- name: Genera il file .env con le credenziali
  ansible.builtin.template:
    src: platform.env.j2
    dest: "{{ compose_dir }}/.env"
    owner: root
    group: root
    mode: "0640"

- name: Genera la configurazione di Vault
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ compose_dir }}/vault/config/vault.hcl"
    owner: root
    group: root
    mode: "0640"

- name: Installa il servizio systemd per i container platform
  ansible.builtin.template:
    src: homelab-platform.service.j2
    dest: /etc/systemd/system/homelab-platform.service
    owner: root
    group: root
    mode: "0644"
  notify: Ricarica systemd

- name: Ricarica systemd se necessario
  ansible.builtin.meta: flush_handlers

# Le immagini vengono scaricate qui (OpenSearch ~1GB, Dashboards ~800MB, Vault ~200MB).
# Questa operazione può richiedere diversi minuti in base alla connessione.
# Separandola dall'avvio del servizio, il servizio systemd trova le immagini già pronte
# e parte in pochi secondi senza timeout.
- name: Scarica le immagini container (può richiedere diversi minuti al primo avvio)
  ansible.builtin.command: podman-compose pull
  args:
    chdir: "{{ compose_dir }}"
  timeout: 1800
  changed_when: true
  when: not ansible_check_mode

# Ricrea i container la cui configurazione è cambiata nel compose file.
# Se i container erano già up e la config non è cambiata, non li tocca.
- name: Avvia o ricrea i container (applica eventuali modifiche al compose)
  ansible.builtin.command: podman-compose up -d
  args:
    chdir: "{{ compose_dir }}"
  changed_when: false
  when: not ansible_check_mode

- name: Abilita il servizio homelab-platform al boot
  ansible.builtin.systemd:
    name: homelab-platform
    enabled: true
  when: not ansible_check_mode

- name: Attendi che OpenSearch sia raggiungibile (può richiedere 60-90 sec al primo avvio)
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 9200
    timeout: 180
    delay: 15
  when: not ansible_check_mode

- name: Attendi che Vault sia raggiungibile
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 8200
    timeout: 60
    delay: 5
  when: not ansible_check_mode

- name: Controlla se Vault è già stato inizializzato
  ansible.builtin.command: >
    podman exec -e VAULT_ADDR=http://127.0.0.1:8200 vault vault status -format=json
  register: vault_status_raw
  # rc 0 = unsealed, rc 2 = sealed (inizializzato o no), rc 1 = errore API.
  # ATTENZIONE: rc=2 vale sia per "sealed" che per "not initialized" — non basta
  # il return code. Il campo 'initialized' nel JSON è la fonte di verità.
  failed_when: vault_status_raw.rc not in [0, 1, 2]
  changed_when: false

- name: Inizializza Vault (solo se non ancora inizializzato)
  ansible.builtin.command: >
    podman exec -e VAULT_ADDR=http://127.0.0.1:8200 vault vault operator init -key-shares=5 -key-threshold=3 -format=json
  register: vault_init_raw
  when:
    - vault_status_raw.stdout != ""
    - not (vault_status_raw.stdout | from_json).initialized

- name: Salva l'output di Vault init in locale (su CachyOS)
  ansible.builtin.copy:
    content: "{{ vault_init_raw.stdout }}"
    dest: "{{ playbook_dir }}/../vault_init_output.json"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: vault_init_raw is not skipped

- name: Istruzioni post-inizializzazione
  ansible.builtin.debug:
    msg: |
      ============================================================
      Vault inizializzato con successo!
      Le chiavi di unseal e il root token sono stati salvati in:
        ansible/vault_init_output.json   (sul tuo CachyOS)

      IMPORTANTE: cifra subito il file con:
        ansible-vault encrypt ansible/vault_init_output.json

      Per unsealing manuale (dopo ogni riavvio di Vault):
        cat ansible/vault_init_output.json   # o decrypt se cifrato
        podman exec -it vault vault operator unseal <chiave_1>
        podman exec -it vault vault operator unseal <chiave_2>
        podman exec -it vault vault operator unseal <chiave_3>
      ============================================================
  when: vault_init_raw is not skipped
