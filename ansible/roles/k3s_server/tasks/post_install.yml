---
# Eseguito su k3s-1 dopo che tutti i nodi hanno fatto il join.

- name: Attendi che tutti e 3 i nodi siano Ready
  ansible.builtin.command: >
    k3s kubectl get nodes -o jsonpath='{range .items[*]}{.status.conditions[-1].type}{"\n"}{end}'
  register: all_nodes_status
  until: (all_nodes_status.stdout_lines | select('ne', 'Ready') | list | length) == 0
  retries: 30
  delay: 15
  changed_when: false

- name: Mostra lo stato del cluster
  ansible.builtin.command: k3s kubectl get nodes -o wide
  register: nodes_output
  changed_when: false

- name: Stampa lo stato dei nodi
  ansible.builtin.debug:
    msg: "{{ nodes_output.stdout_lines }}"

- name: Leggi il kubeconfig dal nodo
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Copia il kubeconfig su CachyOS (con il VIP come server)
  ansible.builtin.copy:
    content: "{{ kubeconfig_raw.content | b64decode | replace('127.0.0.1', kube_vip_ip) }}"
    dest: "~/.kube/config"
    mode: "0600"
  delegate_to: localhost

- name: Kubeconfig copiato
  ansible.builtin.debug:
    msg: |
      Kubeconfig copiato in ~/.kube/config sul tuo CachyOS.
      Puoi ora usare kubectl dal tuo terminale:
        kubectl get nodes
        kubectl get pods -A
