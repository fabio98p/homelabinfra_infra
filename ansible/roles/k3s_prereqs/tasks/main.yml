---
# Prerequisiti di sistema operativo per Longhorn (storage distribuito).
# Longhorn stesso viene installato da ArgoCD, ma questi pacchetti
# devono essere presenti sui nodi prima che Longhorn parta.

- name: Installa open-iscsi e nfs-common (richiesti da Longhorn)
  ansible.builtin.apt:
    name:
      - open-iscsi
      - nfs-common
    state: present

- name: Avvia e abilita il servizio iscsid
  ansible.builtin.systemd:
    name: iscsid
    state: started
    enabled: true
  when: not ansible_check_mode

- name: Carica il modulo kernel iscsi_tcp
  ansible.builtin.command: modprobe iscsi_tcp
  changed_when: false

- name: Carica il modulo kernel dm_thin_pool
  ansible.builtin.command: modprobe dm_thin_pool
  changed_when: false

- name: Rendi i moduli kernel persistenti al riavvio
  ansible.builtin.copy:
    dest: /etc/modules-load.d/longhorn.conf
    content: |
      iscsi_tcp
      dm_thin_pool
    owner: root
    group: root
    mode: "0644"
